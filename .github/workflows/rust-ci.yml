name: Rust CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: rust-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0
  # Keep in sync with Makefile RUST_TARGET_DIR convention (.cache/rust/target)
  CARGO_TARGET_DIR: ${{ github.workspace }}/.cache/rust/target

jobs:
  check:
    name: Rust Check, Lint & Test
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # Swatinem/rust-cache — caches Cargo registry + target dir with
      # automatic pruning of stale artifacts. Keyed off Cargo.lock so
      # routine PRs that don't change deps get near-instant restores.
      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "orbitdock-server -> ../.cache/rust/target"
          # Include workflow + Makefile in the key so cache busts on CI
          # or build-config changes, not just dependency changes.
          shared-key: "rust-ci"
          cache-on-failure: true

      - name: rust fmt check
        run: make rust-fmt-check

      - name: rust clippy
        run: make rust-lint

      - name: rust test
        run: make rust-test
