name: Web CI

on:
  push:
    branches: [main]
    paths:
      - 'orbitdock-web/**'
      - '.github/workflows/web-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'orbitdock-web/**'
      - '.github/workflows/web-ci.yml'

concurrency:
  group: web-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: orbitdock-web

jobs:
  check:
    name: Lint, Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: orbitdock-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Biome lint & format check
        run: npm run ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e
