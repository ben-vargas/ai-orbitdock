name: Codex PR Review

on:
  pull_request:
    branches: [main]
    types: [opened, synchronized, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to review
        required: true
        type: string
  issue_comment:
    types: [created]

concurrency:
  group: codex-pr-review-${{ github.event.pull_request.number || github.event.issue.number || inputs.pr_number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  review:
    name: Review PR
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository) ||
      (github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        contains(github.event.comment.body, '/codex review') &&
        (github.event.comment.author_association == 'OWNER' ||
         github.event.comment.author_association == 'MEMBER' ||
         github.event.comment.author_association == 'COLLABORATOR'))
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}

    steps:
      - name: Resolve PR context
        id: pr_context
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const prNumber =
              context.eventName === "pull_request"
                ? context.payload.pull_request.number
                : context.eventName === "workflow_dispatch"
                  ? Number(context.payload.inputs?.pr_number)
                  : context.payload.issue.number;

            if (!Number.isInteger(prNumber) || prNumber <= 0) {
              core.setFailed(`Invalid PR number: ${prNumber}`);
              return;
            }

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            core.setOutput("pr_number", String(pr.number));
            core.setOutput("title", pr.title);
            core.setOutput("body", pr.body || "");
            core.setOutput("base_ref", pr.base.ref);
            core.setOutput("base_sha", pr.base.sha);
            core.setOutput("head_sha", pr.head.sha);

      - name: Checkout PR merge commit
        uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ steps.pr_context.outputs.pr_number }}/merge
          fetch-depth: 0

      - name: Fetch PR base and head refs
        env:
          PR_BASE_REF: ${{ steps.pr_context.outputs.base_ref }}
          PR_NUMBER: ${{ steps.pr_context.outputs.pr_number }}
        run: |
          git fetch --no-tags origin \
            "$PR_BASE_REF" \
            "+refs/pull/$PR_NUMBER/head"

      - name: Build review prompt
        env:
          PR_NUMBER: ${{ steps.pr_context.outputs.pr_number }}
          PR_TITLE: ${{ steps.pr_context.outputs.title }}
          PR_BODY: ${{ steps.pr_context.outputs.body }}
          PR_BASE_SHA: ${{ steps.pr_context.outputs.base_sha }}
          PR_HEAD_SHA: ${{ steps.pr_context.outputs.head_sha }}
          REPOSITORY: ${{ github.repository }}
        run: |
          cat <<EOF > codex-pr-review-prompt.md
          Review PR #${PR_NUMBER} for ${REPOSITORY}.

          Review scope:
          - Only review changes introduced by this PR.
          - Use git history and diff directly:
            - git log --oneline ${PR_BASE_SHA}...${PR_HEAD_SHA}
            - git diff --stat ${PR_BASE_SHA}...${PR_HEAD_SHA}
            - git diff ${PR_BASE_SHA}...${PR_HEAD_SHA}

          Review instructions:
          - Treat this as a code review, not a summary.
          - Prioritize bugs, behavioral regressions, edge cases, security issues, and missing tests.
          - Use the repo's AGENTS.md guidance and any relevant in-repo docs or skills if helpful.
          - Be skeptical and specific.
          - Ignore nits unless they create real maintenance or correctness risk.
          - If no findings are present, say that explicitly and mention any residual risks or gaps.

          Output format:
          - Start with either:
            - "No findings." or
            - "Findings:" followed by a flat bullet list.
          - For each finding, include:
            - severity: high, medium, or low
            - file reference(s)
            - concise explanation of the risk
            - why it matters in user or system terms
          - After findings, add a short "Residual risks" section only if needed.
          - Keep the whole review concise and scannable.

          Pull request title:
          ${PR_TITLE}

          Pull request body:
          ${PR_BODY}
          EOF

      - name: Run Codex review
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: codex-pr-review-prompt.md
          model: gpt-5.4-mini
          effort: high
          sandbox: read-only

      - name: Post review comment
        if: steps.run_codex.outputs.final-message != ''
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ steps.run_codex.outputs.final-message }}
          PR_NUMBER: ${{ steps.pr_context.outputs.pr_number }}
          PR_HEAD_SHA: ${{ steps.pr_context.outputs.head_sha }}
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: Number(process.env.PR_NUMBER),
              commit_id: process.env.PR_HEAD_SHA,
              body: process.env.CODEX_FINAL_MESSAGE,
              event: "COMMENT",
            });
