name: Nightly Release

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      build_server_assets:
        description: Build and publish nightly server binaries
        required: true
        default: true
        type: boolean
      publish_release:
        description: Publish the nightly GitHub release instead of leaving it as a draft
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  nightly:
    uses: ./.github/workflows/release.yml
    secrets: inherit
    with:
      channel: nightly
      version_mode: auto
      bump: patch
      build_server_assets: ${{ github.event_name != 'workflow_dispatch' || inputs.build_server_assets }}
      publish_release: ${{ github.event_name != 'workflow_dispatch' || inputs.publish_release }}
