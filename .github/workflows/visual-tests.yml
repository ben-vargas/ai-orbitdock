name: Visual Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  visual-tests:
    runs-on: macos-15
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install xcbeautify
        run: brew install xcbeautify

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.3'

      - name: Verify Swift version
        run: swift --version

      - name: Resolve Swift Packages
        run: xcodebuild -resolvePackageDependencies -project OrbitDock/OrbitDock.xcodeproj -scheme OrbitDock

      - name: Run Visual Tests
        env:
          VIZZLY_TOKEN: ${{ secrets.VIZZLY_TOKEN }}
        run: npm run test:ci

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: .build/test-results.xcresult
          retention-days: 7
