name: Create Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

env:
  APP_NAME: OrbitDock

permissions:
  contents: write

jobs:
  release:
    outputs:
      version: ${{ steps.version.outputs.version }}
    runs-on: macos-15
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.3'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Calculate version
        id: version
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          LATEST_VERSION=${LATEST_TAG#v}

          IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_VERSION"

          case "${{ inputs.bump }}" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Bumping $LATEST_VERSION → $NEW_VERSION (${{ inputs.bump }})"

      - name: Bump version and tag
        env:
          GIT_USER_EMAIL: ${{ secrets.GIT_USER_EMAIL }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "Robert DeLuca"
          git config user.email "$GIT_USER_EMAIL"

          cd OrbitDock
          agvtool new-marketing-version "$VERSION"
          agvtool new-version -all 1
          cd ..

          git add -A
          git commit -m "🔖 Bump version to $VERSION"
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin main --follow-tags

      - name: Build orbitdock-server (darwin universal)
        run: |
          cd orbitdock-server
          ./build-universal.sh

      - name: Package orbitdock-server (darwin universal)
        run: |
          mkdir -p dist
          cp orbitdock-server/target/universal/orbitdock-server dist/orbitdock-server
          chmod +x dist/orbitdock-server
          tar -C dist -czf dist/orbitdock-server-darwin-universal.tar.gz orbitdock-server
          cd dist
          shasum -a 256 orbitdock-server-darwin-universal.tar.gz > orbitdock-server-darwin-universal.tar.gz.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: ${{ env.APP_NAME }} v${{ steps.version.outputs.version }}
          draft: true
          files: |
            dist/orbitdock-server-darwin-universal.tar.gz
            dist/orbitdock-server-darwin-universal.tar.gz.sha256
          body: |
            ## ${{ env.APP_NAME }} v${{ steps.version.outputs.version }}

            Build and sign locally, then upload the DMG to this release.

            ```
            make rust-build
            # Archive in Xcode → Product → Archive
            # Export with Developer ID
            # Notarize and staple
            # Upload DMG here
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-linux-server-asset:
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout tagged release
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.version }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build orbitdock-server (linux x86_64)
        run: |
          cd orbitdock-server
          cargo build -p orbitdock-server --release

      - name: Package orbitdock-server (linux x86_64)
        run: |
          mkdir -p dist
          cp orbitdock-server/target/release/orbitdock-server dist/orbitdock-server
          chmod +x dist/orbitdock-server
          tar -C dist -czf dist/orbitdock-server-linux-x86_64.tar.gz orbitdock-server
          cd dist
          sha256sum orbitdock-server-linux-x86_64.tar.gz > orbitdock-server-linux-x86_64.tar.gz.sha256

      - name: Upload linux server asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.release.outputs.version }}
          files: |
            dist/orbitdock-server-linux-x86_64.tar.gz
            dist/orbitdock-server-linux-x86_64.tar.gz.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
