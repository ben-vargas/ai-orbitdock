name: Release

on:
  workflow_dispatch:
    inputs:
      channel:
        description: Release channel to publish
        type: choice
        required: true
        default: stable
        options:
          - stable
          - beta
          - nightly
      version_mode:
        description: Use automatic semantic bumping or provide an explicit version
        type: choice
        required: true
        default: auto
        options:
          - auto
          - explicit
      version:
        description: "Required when version_mode=explicit (example: 0.4.0-beta.2)"
        required: false
      bump:
        description: "SemVer bump used when version_mode=auto (stable/beta channels)"
        type: choice
        required: true
        default: patch
        options:
          - patch
          - minor
          - major
      build_server_assets:
        description: Build and attach server binaries
        type: boolean
        required: true
        default: true
      publish_release:
        description: Publish the GitHub release (set false to leave it in draft)
        type: boolean
        required: true
        default: true

  workflow_call:
    inputs:
      channel:
        required: true
        type: string
        default: stable
      version_mode:
        required: true
        type: string
        default: auto
      version:
        required: false
        type: string
      bump:
        required: true
        type: string
        default: patch
      build_server_assets:
        required: true
        type: boolean
        default: true
      publish_release:
        required: true
        type: boolean
        default: true
    secrets:
      OPENAI_API_KEY:
        required: false
      RELEASE_PUSH_TOKEN:
        required: false

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.channel || 'stable' }}
  cancel-in-progress: false

env:
  APP_NAME: OrbitDock

jobs:
  metadata:
    name: Compute Release Metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.compute.outputs.version }}
      tag: ${{ steps.compute.outputs.tag }}
      build_number: ${{ steps.compute.outputs.build_number }}
      short_sha: ${{ steps.finalize_ref.outputs.short_sha }}
      source_sha: ${{ steps.finalize_ref.outputs.source_sha }}
      build_date: ${{ steps.compute.outputs.build_date }}
      channel: ${{ steps.compute.outputs.channel }}
      release_title: ${{ steps.compute.outputs.release_title }}
      prerelease: ${{ steps.compute.outputs.prerelease }}
      publish_release: ${{ steps.compute.outputs.publish_release }}
      build_server_assets: ${{ steps.compute.outputs.build_server_assets }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PUSH_TOKEN || github.token }}

      - name: Compute versions and tags
        id: compute
        env:
          CHANNEL: ${{ inputs.channel || 'stable' }}
          VERSION_MODE: ${{ inputs.version_mode || 'auto' }}
          REQUESTED_VERSION: ${{ inputs.version }}
          BUMP: ${{ inputs.bump || 'patch' }}
          BUILD_SERVER_ASSETS: ${{ inputs.build_server_assets }}
          PUBLISH_RELEASE: ${{ inputs.publish_release }}
        run: |
          set -euo pipefail

          channel="${CHANNEL:-stable}"
          version_mode="${VERSION_MODE:-auto}"
          bump="${BUMP:-patch}"
          requested_version="${REQUESTED_VERSION:-}"

          latest_stable=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | head -n 1)
          if [[ -z "$latest_stable" ]]; then
            latest_stable="v0.0.0"
          fi
          base_version="${latest_stable#v}"

          strip_v() {
            local raw="$1"
            if [[ "$raw" == v* ]]; then
              echo "${raw#v}"
            else
              echo "$raw"
            fi
          }

          bump_version() {
            local version="$1"
            local bump_type="$2"
            IFS='.' read -r major minor patch <<< "$version"
            case "$bump_type" in
              major)
                major=$((major + 1))
                minor=0
                patch=0
                ;;
              minor)
                minor=$((minor + 1))
                patch=0
                ;;
              patch)
                patch=$((patch + 1))
                ;;
              *)
                echo "error: unknown bump type '$bump_type'" >&2
                exit 1
                ;;
            esac
            echo "${major}.${minor}.${patch}"
          }

          prerelease="false"
          tag=""
          version=""
          release_title=""
          build_date="$(date -u +%Y-%m-%d)"

          if [[ "$version_mode" == "explicit" ]]; then
            if [[ -z "$requested_version" ]]; then
              echo "error: version_mode=explicit requires the 'version' input" >&2
              exit 1
            fi
            version="$(strip_v "$requested_version")"
            case "$channel" in
              stable)
                tag="v${version}"
                prerelease="false"
                release_title="🔖 v${version}"
                ;;
              beta)
                tag="v${version}"
                prerelease="true"
                release_title="🔖 v${version}"
                ;;
              nightly)
                tag="nightly"
                prerelease="true"
                release_title="🔖 v${version}"
                ;;
              *)
                echo "error: unsupported channel '$channel'" >&2
                exit 1
                ;;
            esac
          else
            case "$channel" in
              stable)
                version="$(bump_version "$base_version" "$bump")"
                tag="v${version}"
                prerelease="false"
                release_title="🔖 v${version}"
                ;;
              beta)
                beta_base="$(bump_version "$base_version" "$bump")"
                max_beta=0
                while IFS= read -r beta_tag; do
                  suffix="${beta_tag##*-beta.}"
                  if [[ "$suffix" =~ ^[0-9]+$ ]] && (( suffix > max_beta )); then
                    max_beta=$suffix
                  fi
                done < <(git tag --list "v${beta_base}-beta.*")
                next_beta=$((max_beta + 1))
                version="${beta_base}-beta.${next_beta}"
                tag="v${version}"
                prerelease="true"
                release_title="🔖 v${version}"
                ;;
              nightly)
                date_stamp="$(date -u +%Y%m%d)"
                version="${base_version}-nightly.${date_stamp}"
                tag="nightly"
                prerelease="true"
                release_title="🔖 v${version}"
                ;;
              *)
                echo "error: unsupported channel '$channel'" >&2
                exit 1
                ;;
            esac
          fi

          echo "build_date=${build_date}" >> "$GITHUB_OUTPUT"

          short_sha="$(git rev-parse --short=12 HEAD)"
          date_stamp="$(date -u +%Y%m%d)"
          time_stamp="$(date -u +%H%M)"

          if [[ "$channel" == "nightly" ]]; then
            build_number="${date_stamp}01"
          else
            build_number="${date_stamp}${time_stamp}"
          fi

          publish_release_value="${PUBLISH_RELEASE:-true}"
          build_server_value="${BUILD_SERVER_ASSETS:-true}"

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "build_number=$build_number" >> "$GITHUB_OUTPUT"
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"
          echo "channel=$channel" >> "$GITHUB_OUTPUT"
          echo "release_title=$release_title" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"
          echo "publish_release=$publish_release_value" >> "$GITHUB_OUTPUT"
          echo "build_server_assets=$build_server_value" >> "$GITHUB_OUTPUT"

      - name: Commit server version bump
        if: ${{ steps.compute.outputs.channel != 'nightly' }}
        env:
          VERSION: ${{ steps.compute.outputs.version }}
          CHANNEL: ${{ steps.compute.outputs.channel }}
          ACTOR: ${{ github.triggering_actor || github.actor }}
          RELEASE_PUSH_TOKEN: ${{ secrets.RELEASE_PUSH_TOKEN }}
        run: |
          set -euo pipefail

          if [[ -z "${RELEASE_PUSH_TOKEN:-}" ]]; then
            echo "error: RELEASE_PUSH_TOKEN is required so release commits/pushes run as your account." >&2
            exit 1
          fi

          update_workspace_version() {
            local target_version="$1"
            local file="orbitdock-server/Cargo.toml"
            local tmp_file
            tmp_file="$(mktemp)"

            awk -v target="$target_version" '
              BEGIN {
                in_workspace_pkg = 0
                updated = 0
              }
              /^\[workspace\.package\]$/ {
                in_workspace_pkg = 1
                print
                next
              }
              /^\[/ {
                in_workspace_pkg = 0
              }
              in_workspace_pkg && /^version = "/ && updated == 0 {
                print "version = \"" target "\""
                updated = 1
                next
              }
              {
                print
              }
            ' "$file" > "$tmp_file"

            mv "$tmp_file" "$file"
          }

          update_lock_versions() {
            local target_version="$1"
            local file="orbitdock-server/Cargo.lock"
            local tmp_file
            tmp_file="$(mktemp)"

            awk -v target="$target_version" '
              BEGIN {
                in_package = 0
                package_name = ""
              }
              /^\[\[package\]\]$/ {
                in_package = 1
                package_name = ""
                print
                next
              }
              in_package && /^name = "/ {
                package_name = $0
                sub(/^name = "/, "", package_name)
                sub(/"$/, "", package_name)
                print
                next
              }
              in_package && /^version = "/ {
                if (package_name ~ /^orbitdock($|-)/) {
                  print "version = \"" target "\""
                  next
                }
              }
              {
                print
              }
            ' "$file" > "$tmp_file"

            mv "$tmp_file" "$file"
          }

          update_workspace_version "$VERSION"
          update_lock_versions "$VERSION"

          if git diff --quiet -- orbitdock-server/Cargo.toml orbitdock-server/Cargo.lock; then
            echo "Server manifests already at ${VERSION}; skipping commit."
            exit 0
          fi

          git config user.name "$ACTOR"
          git config user.email "${ACTOR}@users.noreply.github.com"

          git add orbitdock-server/Cargo.toml orbitdock-server/Cargo.lock
          git commit \
            -m "🔖 Bump orbitdock-server crates to v${VERSION}" \
            -m "Automated by release workflow for ${CHANNEL} channel."
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Capture source revision
        id: finalize_ref
        run: |
          set -euo pipefail
          echo "source_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "short_sha=$(git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"

  release_notes:
    name: Generate Release Notes
    needs: metadata
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.metadata.outputs.version }}
      CHANNEL: ${{ needs.metadata.outputs.channel }}
      SHORT_SHA: ${{ needs.metadata.outputs.short_sha }}
      BUILD_DATE: ${{ needs.metadata.outputs.build_date }}
      TAG_NAME: ${{ needs.metadata.outputs.tag }}
      BUILD_SERVER_ASSETS: ${{ needs.metadata.outputs.build_server_assets }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.metadata.outputs.source_sha }}

      - name: Prepare changelog context
        id: changelog
        run: |
          set -euo pipefail
          mkdir -p dist

          case "$CHANNEL" in
            nightly)
              base_ref="refs/tags/nightly"
              if ! git rev-parse --verify "$base_ref" >/dev/null 2>&1; then
                base_ref="$(git rev-list --max-parents=0 HEAD | tail -n 1)"
              fi
              previous_label="$base_ref"
              ;;
            *)
              previous_label="$(git tag --list 'v*' --sort=-version:refname | head -n 1)"
              if [[ -z "$previous_label" ]]; then
                previous_label="$(git rev-list --max-parents=0 HEAD | tail -n 1)"
              fi
              base_ref="$previous_label"
              ;;
          esac

          echo "PREVIOUS_REF=$previous_label" >> "$GITHUB_ENV"
          echo "BASE_REF=$base_ref" >> "$GITHUB_ENV"

          git diff --summary "$base_ref"...HEAD > dist/release-diff-summary.txt
          git diff --stat "$base_ref"...HEAD > dist/release-diff-stat.txt
          git diff --name-only "$base_ref"...HEAD > dist/release-changed-files.txt
          git log --no-merges --date=short --format='- %h %s (%ad)' "$base_ref"...HEAD > dist/release-commit-log.txt

          cat <<EOF > dist/release-notes-prompt.md
          Write GitHub release notes for the OrbitDock release in changelog style.

          Requirements:
          - Be factual and use only the provided git history and diff context.
          - Do not invent behavior changes.
          - Prefer a polished, concise markdown format.
          - Include these sections when they are supported by the diff:
            - Highlights
            - Detailed Changes
            - Notes
          - Mention the release channel and whether server binaries are attached.
          - If the diff is mostly maintenance, say so plainly.
          - In Detailed Changes, group related work with bold lead-ins when helpful.

          Git diff summary:
          $(cat dist/release-diff-summary.txt)

          Git diff --stat:
          $(cat dist/release-diff-stat.txt)

          Changed files:
          $(cat dist/release-changed-files.txt)

          Commit log:
          $(cat dist/release-commit-log.txt)

          Server binaries attached: ${BUILD_SERVER_ASSETS}
          EOF

      - name: Generate release notes
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: dist/release-notes-prompt.md
          output-file: dist/${{ env.APP_NAME }}-${{ env.VERSION }}.md
          model: gpt-5.4-mini
          effort: high
          sandbox: read-only

      - name: Upload release notes artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: |
            dist/${{ env.APP_NAME }}-${{ env.VERSION }}.md
            dist/release-diff-summary.txt
            dist/release-diff-stat.txt
            dist/release-changed-files.txt
            dist/release-commit-log.txt

  server:
    name: Build Server (${{ matrix.target }})
    needs: metadata
    if: ${{ needs.metadata.outputs.build_server_assets == 'true' || needs.metadata.outputs.build_server_assets == true }}
    strategy:
      matrix:
        include:
          - target: darwin-arm64
            runner: macos-15
            package_target: rust-release-darwin
          - target: linux-x86_64
            runner: ubuntu-latest
            package_target: rust-release-linux-x86_64
          - target: linux-aarch64
            runner: ubuntu-24.04-arm
            package_target: rust-release-linux-aarch64
    runs-on: ${{ matrix.runner }}
    env:
      CARGO_PROFILE_RELEASE_LTO: "false"
      CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "16"
      ORBITDOCK_BUILD_VERSION: ${{ needs.metadata.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.metadata.outputs.source_sha }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install native dependencies
        if: ${{ startsWith(matrix.target, 'linux') }}
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends pkg-config libcap-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: orbitdock-web/package-lock.json

      - name: Install web dependencies
        working-directory: orbitdock-web
        run: npm ci

      - name: Package server
        run: make ${{ matrix.package_target }}

      - name: Upload server artifacts
        uses: actions/upload-artifact@v4
        with:
          name: server-${{ matrix.target }}
          path: |
            dist/orbitdock-${{ matrix.target }}.zip
            dist/orbitdock-${{ matrix.target }}.zip.sha256

  publish:
    name: Publish Release
    needs:
      - metadata
      - release_notes
      - server
    if: ${{ always() && needs.metadata.result == 'success' && (needs.server.result == 'success' || needs.server.result == 'skipped') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_REPO: ${{ github.repository }}
      VERSION: ${{ needs.metadata.outputs.version }}
      TAG_NAME: ${{ needs.metadata.outputs.tag }}
      RELEASE_TITLE: ${{ needs.metadata.outputs.release_title }}
      PRERELEASE: ${{ needs.metadata.outputs.prerelease }}
      PUBLISH_RELEASE: ${{ needs.metadata.outputs.publish_release }}
      RELEASE_SHA: ${{ needs.metadata.outputs.source_sha }}
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          notes_file="dist/${APP_NAME}-${VERSION}.md"
          if [[ ! -f "$notes_file" ]]; then
            notes_file="/tmp/notes.md"
            printf "# %s %s\n\nAuto-generated release.\n" "$APP_NAME" "$VERSION" > "$notes_file"
          fi

          draft_value="true"
          if [[ "${PUBLISH_RELEASE,,}" == "true" ]]; then
            draft_value="false"
          fi
          prerelease_value="false"
          if [[ "${PRERELEASE,,}" == "true" ]]; then
            prerelease_value="true"
          fi

          if [[ "$TAG_NAME" == "nightly" ]]; then
            gh api \
              --method PATCH \
              "/repos/${GH_REPO}/git/refs/tags/nightly" \
              -f sha="${RELEASE_SHA}" \
              -F force=true >/dev/null 2>&1 || \
            gh api \
              --method POST \
              "/repos/${GH_REPO}/git/refs" \
              -f ref="refs/tags/nightly" \
              -f sha="${RELEASE_SHA}" >/dev/null
          fi

          if release_id="$(gh api "/repos/${GH_REPO}/releases/tags/${TAG_NAME}" --jq '.id' 2>/dev/null)"; then
            gh api \
              --method PATCH \
              "/repos/${GH_REPO}/releases/${release_id}" \
              -f tag_name="$TAG_NAME" \
              -f target_commitish="$RELEASE_SHA" \
              -f name="$RELEASE_TITLE" \
              -F body="@${notes_file}" \
              -F draft="$draft_value" \
              -F prerelease="$prerelease_value" >/dev/null
          else
            release_id="$(
              gh api \
                --method POST \
                "/repos/${GH_REPO}/releases" \
                -f tag_name="$TAG_NAME" \
                -f target_commitish="$RELEASE_SHA" \
                -f name="$RELEASE_TITLE" \
                -F body="@${notes_file}" \
                -F draft="$draft_value" \
                -F prerelease="$prerelease_value" \
                --jq '.id'
            )"
          fi

          upload_asset() {
            local file="$1"
            [[ -f "$file" ]] || return 0
            gh release upload "$TAG_NAME" "$file" --repo "$GH_REPO" --clobber >/dev/null
          }

          mapfile -t release_assets < <(
            find dist -maxdepth 1 -type f \
              \( -name 'orbitdock-*.zip' -o -name 'orbitdock-*.zip.sha256' \) \
              | sort
          )

          if [[ "${#release_assets[@]}" -eq 0 ]]; then
            echo "No server release assets found in dist; skipping upload."
            exit 0
          fi

          for asset_path in "${release_assets[@]}"; do
            upload_asset "$asset_path"
          done

          if [[ "${PUBLISH_RELEASE,,}" == "true" ]]; then
            gh api \
              --method PATCH \
              "/repos/${GH_REPO}/releases/${release_id}" \
              -F draft=false >/dev/null
          fi
