name: macOS Unit Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  orbitdock-unit-tests:
    name: OrbitDock Unit Tests
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Ensure cache directories
        run: make xcode-cache-dirs

      - name: Run unit tests
        run: make test-unit
